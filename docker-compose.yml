services:

  app:
    build: .
    container_name: video-loader

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}

  scheduler:
    build: .
    volumes:
      - .:/app
    command: php artisan schedule:work
    depends_on:
      - app

  camunda:
    image: camunda/camunda-bpm-platform:latest
    ports:
      - "8080:8080"